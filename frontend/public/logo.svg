<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1ac8b0"/>
      <stop offset="100%" stop-color="#7b2fbe"/>
    </linearGradient>
    <linearGradient id="inner" x1="128" y1="128" x2="384" y2="384" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#2d1052"/>
    </linearGradient>
    <linearGradient id="d" x1="180" y1="160" x2="340" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1ac8b0"/>
      <stop offset="50%" stop-color="#d64b8a"/>
      <stop offset="100%" stop-color="#7b2fbe"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)" opacity="0.9"/>
  <!-- Inner circle -->
  <circle cx="256" cy="256" r="220" fill="url(#inner)"/>
  <!-- Teal accent ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#1ac8b0" stroke-width="2" opacity="0.3"/>
  <!-- D letter -->
  <g filter="url(#glow)">
    <path d="M200 160 L200 352 L280 352 C340 352 380 310 380 256 C380 202 340 160 280 160 Z M232 192 L275 192 C318 192 348 218 348 256 C348 294 318 320 275 320 L232 320 Z" fill="url(#d)"/>
  </g>
  <!-- Small flame icon -->
  <path d="M340 380 C340 370 348 360 348 350 C348 340 340 332 336 340 C332 332 324 340 324 350 C324 360 332 370 332 380 Z" fill="#d64b8a" opacity="0.8"/>
  <!-- Sparkle dots -->
  <circle cx="160" cy="140" r="4" fill="#1ac8b0" opacity="0.6"/>
  <circle cx="380" cy="150" r="3" fill="#d64b8a" opacity="0.5"/>
  <circle cx="140" cy="370" r="3" fill="#7b2fbe" opacity="0.5"/>
</svg>
