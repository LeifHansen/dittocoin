<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradients for the blob -->
    <linearGradient id="blobGradientStaking" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7b2fbe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a2e;stop-opacity:1" />
    </linearGradient>

    <!-- Glow effect -->
    <filter id="glowStaking">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Gold coin gradient -->
    <radialGradient id="coinGradientStaking">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffed4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#daa520;stop-opacity:1" />
    </radialGradient>

    <!-- Shine effect for coin -->
    <linearGradient id="coinShineStaking" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.4" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.2" />
    </linearGradient>

    <!-- Teal glow for staking effect -->
    <filter id="stackGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background glow -->
  <circle cx="256" cy="256" r="200" fill="#1ac8b0" opacity="0.08" filter="url(#glowStaking)"/>

  <!-- Coin Stack - Bottom coin (largest) -->
  <circle cx="280" cy="380" r="65" fill="url(#coinGradientStaking)" filter="url(#stackGlow)"/>
  <ellipse cx="270" cy="365" rx="50" ry="35" fill="url(#coinShineStaking)"/>
  <circle cx="280" cy="380" r="65" fill="none" stroke="#daa520" stroke-width="2" opacity="0.5"/>

  <!-- Coin Stack - Middle coin -->
  <circle cx="256" cy="320" r="55" fill="url(#coinGradientStaking)" filter="url(#stackGlow)" opacity="0.95"/>
  <ellipse cx="248" cy="308" rx="42" ry="28" fill="url(#coinShineStaking)"/>
  <circle cx="256" cy="320" r="55" fill="none" stroke="#daa520" stroke-width="2" opacity="0.4"/>

  <!-- Coin Stack - Top coin -->
  <circle cx="256" cy="265" r="48" fill="url(#coinGradientStaking)" filter="url(#stackGlow)" opacity="0.9"/>
  <ellipse cx="250" cy="256" rx="38" ry="24" fill="url(#coinShineStaking)"/>
  <circle cx="256" cy="265" r="48" fill="none" stroke="#daa520" stroke-width="2" opacity="0.3"/>

  <!-- Coin Stack - Small top coin -->
  <circle cx="256" cy="220" r="38" fill="url(#coinGradientStaking)" filter="url(#stackGlow)" opacity="0.85"/>
  <ellipse cx="252" cy="213" rx="28" ry="18" fill="url(#coinShineStaking)"/>

  <!-- Main blob body (sitting position - offset slightly) -->
  <path d="M 200 180 C 240 150 280 150 310 170 C 340 190 350 240 330 290 C 310 320 260 340 220 340 C 180 340 160 310 160 260 C 160 210 170 190 200 180"
        fill="url(#blobGradientStaking)" filter="url(#glowStaking)"/>

  <!-- Left ear bump -->
  <ellipse cx="150" cy="200" rx="30" ry="40" fill="url(#blobGradientStaking)" opacity="0.9" filter="url(#glowStaking)"/>

  <!-- Right ear bump -->
  <ellipse cx="330" cy="190" rx="32" ry="42" fill="url(#blobGradientStaking)" opacity="0.9" filter="url(#glowStaking)"/>

  <!-- Teal accent highlight on blob -->
  <ellipse cx="180" cy="200" rx="35" ry="45" fill="#1ac8b0" opacity="0.15"/>

  <!-- Pink accent highlight on blob -->
  <ellipse cx="300" cy="280" rx="30" ry="35" fill="#d64b8a" opacity="0.12"/>

  <!-- Left eye white -->
  <circle cx="180" cy="220" r="22" fill="#ffffff"/>

  <!-- Right eye white -->
  <circle cx="280" cy="220" r="22" fill="#ffffff"/>

  <!-- Left eye pupil -->
  <circle cx="184" cy="226" r="13" fill="#1a0a2e"/>

  <!-- Right eye pupil -->
  <circle cx="276" cy="226" r="13" fill="#1a0a2e"/>

  <!-- Left eye shine -->
  <circle cx="188" cy="222" r="5" fill="#ffffff" opacity="0.8"/>

  <!-- Right eye shine -->
  <circle cx="280" cy="222" r="5" fill="#ffffff" opacity="0.8"/>

  <!-- Happy closed eyes (smiling expression) -->
  <path d="M 165 240 Q 180 250 195 240"
        stroke="#d64b8a" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.7"/>

  <path d="M 265 240 Q 280 250 295 240"
        stroke="#d64b8a" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Mouth curve (big smile - happy) -->
  <path d="M 200 270 Q 230 295 260 270"
        stroke="#d64b8a" stroke-width="6" fill="none" stroke-linecap="round"/>

  <!-- Sparkle effects on coin stack -->
  <g opacity="0.8" filter="url(#stackGlow)">
    <circle cx="220" cy="240" r="5" fill="#1ac8b0"/>
    <circle cx="310" cy="290" r="4" fill="#1ac8b0"/>
    <circle cx="300" cy="350" r="4.5" fill="#d64b8a"/>
    <circle cx="200" cy="380" r="4" fill="#d64b8a"/>
  </g>

  <!-- Additional small sparkles around mascot -->
  <g opacity="0.6">
    <circle cx="100" cy="150" r="3" fill="#1ac8b0"/>
    <circle cx="120" cy="260" r="2" fill="#d64b8a"/>
    <circle cx="350" cy="200" r="2.5" fill="#1ac8b0"/>
    <circle cx="360" cy="320" r="2" fill="#d64b8a"/>
  </g>

  <!-- "+STAKING" text indicator (subtle) -->
  <text x="130" y="420" font-family="Arial, sans-serif" font-size="20" font-weight="bold"
        fill="#1ac8b0" opacity="0.7">STAKING</text>
</svg>
